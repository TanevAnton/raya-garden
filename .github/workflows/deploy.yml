name: Build & deploy to SuperHosting

# Push to main → build the static site → FTP-sync dist/ to SuperHosting.
# Sanity content is fetched in the browser at runtime, so content edits in
# Studio go live with no rebuild — this only runs when the code changes.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # lets you trigger a deploy manually from the Actions tab

concurrency:
  group: deploy-superhosting
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # Skip the FTP step until the credentials are configured, so the first
    # push (before secrets exist) still builds green instead of failing red.
    env:
      HAS_FTP: ${{ secrets.FTP_SERVER != '' && secrets.FTP_USERNAME != '' && secrets.FTP_PASSWORD != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # These VITE_* values are public client config (they ship inside the
        # JS bundle either way), so they live here rather than in secrets.
        env:
          VITE_SANITY_PROJECT_ID: q2yxl7gs
          VITE_SANITY_DATASET: production
          VITE_FORMSPREE_ENDPOINT: https://formspree.io/f/mvzlnlav
        run: npm run build

      # Deploy with lftp over explicit FTPS. SuperHosting's Pure-FTPd uses a
      # self-signed cert (CN cloud.theadmin.net), so standard FTPS actions
      # fail strict verification — lftp keeps the transfer encrypted but
      # skips cert verification. `mirror -R --delete` makes the remote folder
      # match dist/ exactly (uploads changed files, removes stale ones),
      # including the hidden .htaccess.
      - name: Deploy to SuperHosting via FTPS (lftp)
        if: ${{ env.HAS_FTP == 'true' }}
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: ${{ vars.FTP_SERVER_DIR || 'rayagarden.bg/' }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -c "set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate no; set net:timeout 20; set net:max-retries 2; set net:persist-retries 3; open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" \"$FTP_SERVER\"; mirror -R --delete --parallel=2 --verbose --exclude-glob .git* ./dist/ \"$FTP_DIR\""
